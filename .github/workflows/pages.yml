name: GitHub Pages

on:
  push:
    branches: [ master, 'v1.3' ]
  workflow_run:
    workflows: ["Test", "Load Test"]
    types:
      - completed
    branches: [ '**' ]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/configure-pages@v6

      # Create site directory
      - name: Create site directory
        # language=bash
        run: |
          mkdir -p _build _site
          cp README.md _build/
          cp _config.yml _build/
          cp -r _includes _build/
          cp -r docs _build/

      # Build docs from root
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./_build
          destination: ./_site

      # Download and merge any test reports
      - name: Process Reports
        # language=bash
        run: |
          mkdir -p "_site/reports"
          gh auth login --with-token <<< "${{ github.token }}"
          gh run download --pattern "*-reports-*" --dir _site/reports
          # Create copy of latest master report
          # Prefer reports with JaCoCo coverage data so README coverage links resolve.
          # Matches legacy junit-reports-master-* and matrix artifacts like junit-reports-postgres-master-*.
          test_report_regex='.*/junit-reports(-[^-]+)?-master-[^/]+$'
          latest_junit=$(find _site/reports -regextype posix-extended -maxdepth 1 -type d -regex "$test_report_regex" -exec test -f '{}/coverage/jacoco.csv' ';' -print 2>/dev/null | sort -V | tail -1)
          if [ -z "$latest_junit" ]; then
            latest_junit=$(find _site/reports -regextype posix-extended -maxdepth 1 -type d -regex "$test_report_regex" 2>/dev/null | sort -V | tail -1)
          fi
          if [ -n "$latest_junit" ] && [ -d "$latest_junit" ]; then
            mkdir -p _site/reports/latest-junit
            cp -r "$latest_junit/." _site/reports/latest-junit/
            if [ ! -f _site/reports/latest-junit/coverage-badge.json ] && [ -f _site/reports/latest-junit/coverage/jacoco.csv ]; then
              LINE_MISSED=$(tail -n +2 _site/reports/latest-junit/coverage/jacoco.csv | awk -F',' '{s+=$8} END {print s+0}')
              LINE_COVERED=$(tail -n +2 _site/reports/latest-junit/coverage/jacoco.csv | awk -F',' '{s+=$9} END {print s+0}')
              LINE_TOTAL=$((LINE_MISSED + LINE_COVERED))
              if [ "$LINE_TOTAL" -gt 0 ]; then
                LINE_PCT=$(awk "BEGIN {printf \"%.1f\", ($LINE_COVERED / $LINE_TOTAL) * 100}")
              else
                LINE_PCT="0.0"
              fi
              BADGE_COLOR=$(awk -v pct="$LINE_PCT" 'BEGIN {
                if (pct >= 90) print "brightgreen";
                else if (pct >= 75) print "yellowgreen";
                else if (pct >= 60) print "yellow";
                else if (pct >= 50) print "orange";
                else print "red";
              }')
              printf '{\n  "schemaVersion": 1,\n  "label": "coverage",\n  "message": "%s%%",\n  "color": "%s"\n}\n' "$LINE_PCT" "$BADGE_COLOR" > _site/reports/latest-junit/coverage-badge.json
            fi
          fi
          latest_gatling=$(ls -dv _site/reports/gatling-reports-master-* 2>/dev/null | tail -1)
          if [ -n "$latest_gatling" ] && [ -d "$latest_gatling" ]; then
            mkdir -p _site/reports/latest-gatling
            cp -r "$latest_gatling/." _site/reports/latest-gatling/
          fi
          dependabot_message="current"
          dependabot_color="brightgreen"
          if [ ! -f ".github/dependabot.yml" ]; then
            dependabot_message="cannot run"
            dependabot_color="red"
          elif ! failed_dependabot_run_count=$( \
            gh api --paginate --slurp "/repos/${GITHUB_REPOSITORY}/actions/runs?actor=dependabot%5Bbot%5D&status=completed&per_page=100" 2>/dev/null \
              | jq -e '[.[].workflow_runs[] | select(.conclusion == "failure")] | length' \
          ); then
            dependabot_message="cannot run"
            dependabot_color="red"
          elif [ "$failed_dependabot_run_count" -gt 0 ]; then
            dependabot_message="failed"
            dependabot_color="red"
          elif ! dependabot_pr_count=$(gh pr list --state open --author "dependabot[bot]" --json number --jq 'length' 2>/dev/null); then
            dependabot_message="cannot run"
            dependabot_color="red"
          elif [ "$dependabot_pr_count" -gt 0 ]; then
            dependabot_message="$dependabot_pr_count updates"
            if [ "$dependabot_pr_count" -eq 1 ]; then
              dependabot_message="1 update"
            fi
            dependabot_color="yellow"
          fi
          jq -n \
            --arg label "dependabot" \
            --arg message "$dependabot_message" \
            --arg color "$dependabot_color" \
            '{schemaVersion: 1, label: $label, message: $message, color: $color}' \
            > _site/reports/dependabot-badge.json
          cat > _site/reports/index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <title>Test Reports</title>
            <style>
              :root {
                /* Light mode variables */
                --heading-color: #2c3e50;
                --border-color: #eee;
                --report-bg: #f8f9fa;
                --link-color: #3498db;
                --latest-bg: #e8f5e9;
                --latest-border: #4caf50;
                --text-color: #000;
                --bg-color: #fff;
              }
              @media (prefers-color-scheme: dark) {
                :root {
                  color-scheme: dark;
                  /* Dark mode variables */
                  --heading-color: #89a7c3;
                  --border-color: #333;
                  --report-bg: #2a2a2a;
                  --link-color: #5dade2;
                  --latest-bg: #1b3320;
                  --latest-border: #2d6a31;
                  --text-color: #fff;
                  --bg-color: #1a1a1a;
                }
              }
              body {
                font-family: system-ui, -apple-system, sans-serif;
                margin: 2em auto;
                max-width: 800px;
                line-height: 1.6;
                color: var(--text-color);
                background: var(--bg-color);
              }
              h1 {
                color: var(--heading-color);
                border-bottom: 2px solid var(--border-color);
                padding-bottom: 0.5em;
              }
              .report {
                margin: 1em 0;
                padding: 0.8em;
                background: var(--report-bg);
                border-radius: 4px;
              }
              .report a {
                color: var(--link-color);
                text-decoration: none;
              }
              .report a:hover {
                text-decoration: underline;
              }
              .latest {
                background: var(--latest-bg);
                border-left: 4px solid var(--latest-border);
              }
            </style>
          </head>
          <body>
            <h1>Test Reports</h1>
            <div class='report'>
              <a href='$(basename $latest_gatling)/'>Latest Gatling Report</a>
            </div>
            <div class='report'>
              <a href='$(basename $latest_junit)/'>Latest JUnit Report</a>
            </div>
            <div class='report'>
              <a href='$(basename $latest_junit)/coverage/'>Latest Coverage Report</a>
            </div>
            <h2>All Reports</h2>
            <div id="reports">
              $(for d in _site/reports/*/; do
                name=$(basename "$d")
                if [[ ! "$name" =~ ^latest-.*$ ]]; then
                  echo "<div class='report'><a href='$name/'>$name</a></div>"
                fi
              done)
            </div>
          </body>
          </html>
          EOF

      # Upload combined site
      - uses: actions/upload-pages-artifact@v5

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/deploy-pages@v5
